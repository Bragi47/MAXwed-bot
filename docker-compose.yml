services:
  bot:
    build: .
    container_name: maxwed-bot
    restart: always
    env_file:
      - .env
    volumes:
      - ./key.bin:/app/key.bin:ro
      - ./token.enc:/app/token.enc:ro
      - ./admin.enc:/app/admin.enc:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f bot.py || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
